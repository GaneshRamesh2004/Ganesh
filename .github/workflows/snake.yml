# ============================================================
#   GANESH R — NexusGrid Labs
#   Contribution Snake Animation Workflow
#   Auto-generates snake SVG from GitHub contribution grid
# ============================================================

name: 🐍 Generate Contribution Snake

on:
  # Run daily at midnight IST (18:30 UTC)
  schedule:
    - cron: "30 18 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Also run on push to main branch
  push:
    branches:
      - main
      - master

jobs:
  generate:
    name: 🐍 Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: ⚡ Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🐍 Generate GitHub Contribution Snake (Dark Theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: 🚀 Push Snake SVG to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
